<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription - Batcave</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #212529; color: #fff; padding: 40px; }
    .card { max-width: 400px; margin: auto; background-color: #2c3034; }
  </style>
  <script src="/register.js" defer></script>
</head>
<body>
  <div class="card p-4 text-light">
    <h1 class="h3 mb-4 text-center">Inscription</h1>
    <form id="register-form">
      <div class="mb-3">
        <label for="username" class="form-label">Nom d'utilisateur</label>
        <input type="text" class="form-control" id="username" placeholder="Nom d'utilisateur" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="password" placeholder="Mot de passe (8 caractères min.)" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
      <p id="message" class="mt-3 text-center"></p>
    </form>
    <p class="mt-2 text-center">
      Déjà un compte ? <a href="/auth/login">Se connecter</a>
    </p>
  </div>
</body>
</html>
