<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Bat-computer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #212529; color: #fff; padding: 40px; }
    .arsenal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="d-flex justify-content-between align-items-center">
      <h1>Bienvenue dans la Batcave, Justicier {{username}}</h1>
      <a href="/auth/logout" class="btn btn-outline-danger">Se déconnecter</a>
    </div>

    <p class="text-secondary">Accès autorisé via votre badge de session.</p>

    <div class="arsenal-grid">
      <div class="card bg-dark text-light border-secondary">
        <div class="card-body text-center">
          <h5 class="card-title">Batarang</h5>
          <p class="card-text">Arme de jet</p>
        </div>
      </div>
      <div class="card bg-dark text-light border-secondary">
        <div class="card-body text-center">
          <h5 class="card-title">Batmobile</h5>
          <p class="card-text">Véhicule de Batman</p>
        </div>
      </div>
      <div class="card bg-dark text-light border-secondary">
        <div class="card-body text-center">
          <h5 class="card-title">Cape</h5>
          <p class="card-text">Permet de planer</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
