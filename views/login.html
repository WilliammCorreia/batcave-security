<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion - Batcave</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #212529; color: #fff; padding: 40px; }
    .card { max-width: 400px; margin: auto; background-color: #2c3034; }
  </style>
</head>
<body>
  <div class="card p-4 text-light">
    <h1 class="h3 mb-4 text-center">🦇 Accès Batcave</h1>
    <form action="/auth/login" method="POST">
      <div class="mb-3">
        <label for="username" class="form-label">Nom d'utilisateur</label>
        <input type="text" class="form-control" id="username" name="username" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Se connecter</button>
    </form>
    <p class="mt-3 text-center">
      Pas encore d'accès ? <a href="/auth/register">Créer un compte</a>
    </p>
  </div>
</body>
</html>
