<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bat-computer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #212529; color: #fff; padding: 20px; }
        .arsenal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
    </style>
    <script src="bat-computer.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Bienvenue dans la Batcave</h1>
        <div id="arsenal" class="arsenal-grid">
        </div>
    </div>
</body>
</html>
